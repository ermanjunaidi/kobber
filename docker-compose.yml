services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kobber
      POSTGRES_USER: kobber
      POSTGRES_PASSWORD: kobber123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kobber"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://kobber:kobber123@postgres:5432/kobber?sslmode=disable
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: oven/bun:1
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: http://backend:8080
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    command: sh -c "bun install && bun run dev --host 0.0.0.0"
    depends_on:
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://backend:8080
    profiles:
      - tunnel
    depends_on:
      - backend

volumes:
  pgdata:
