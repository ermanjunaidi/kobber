services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kobber
      POSTGRES_USER: kobber
      POSTGRES_PASSWORD: kobber123
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kobber"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    image: oven/bun:1
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: http://backend:8080
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    command: sh -c "bun install && bun run dev --host 0.0.0.0"
    depends_on:
      - backend
    profiles:
      - dev

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # Port 8080 hanya di-expose di development (local testing)
    # Di production, routing dilakukan oleh Traefik via network traefik-public
    ports:
      - "8080:8080"
    networks:
      - default
      - traefik-public
    environment:
      DATABASE_URL: postgres://kobber:kobber123@postgres:5432/kobber?sslmode=disable
      PORT: "8080"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kobber.rule=Host(`raportns.my.id`)"
      - "traefik.http.routers.kobber.entrypoints=web"
      - "traefik.http.services.kobber.loadbalancer.server.port=8080"

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --config /etc/cloudflared/config.yml --protocol http2 run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    volumes:
      - ./cloudflared:/etc/cloudflared
    networks:
      - default
      - traefik-public
    restart: unless-stopped
    profiles:
      - tunnel
      - prod
    depends_on:
      - backend

volumes:
  pgdata:

networks:
  traefik-public:
    external: true
